name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - run: python -m pip install -e .
      - run: ruff check .
      - run: mypy .
